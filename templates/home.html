<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Classifier AI | Machine Learning Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --card-bg: #ffffff;
            --header-gradient: linear-gradient(135deg, #33475b 0%, #1a2a3a 100%);
            --accent-green: #04AA6D;
            --text-dark: #2d3436;
            --border-color: #dfe6e9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 850px;
            background: var(--header-gradient);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 { margin: 0; font-size: 1.8rem; }
        .header p { margin: 10px 0 0; opacity: 0.8; font-weight: 300; }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        input[type=text], select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        input[type=text]:focus, select:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(4, 170, 109, 0.1);
        }

        .submit-area {
            grid-column: span 2;
            text-align: center;
            margin-top: 30px;
        }

        input[type=submit] {
            background-color: var(--accent-green);
            color: white;
            padding: 14px 60px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type=submit]:hover {
            background-color: #038d5a;
            transform: translateY(-2px);
        }

        @media screen and (max-width: 650px) {
            .form-grid { grid-template-columns: 1fr; }
            .submit-area { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Income Prediction System</h1>
        <p>End-to-End Machine Learning Deployment</p>
    </div>

    <div class="container">
        <!-- Backend se connect karne ke liye correct URL reference -->
        <form action="{{url_for('prediction_data')}}" method="POST">
            <div class="form-grid">
                
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="text" id="age" name="age" placeholder="e.g. 30" required>
                </div>

                <div class="form-group">
                    <label for="workclass">Workclass</label>
                    <select id="workclass" name="workclass">
                        <option value="3">Private</option>
                        <option value="6">State-gov</option>
                        <option value="5">Self-emp-not-inc</option>
                        <option value="0">Federal-gov</option>
                        <option value="1">Local-gov</option>
                        <option value="4">Self-emp-inc</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="education_num">Education Level</label>
                    <select id="education_num" name="education_num">
                        <option value="13">Bachelors</option>
                        <option value="14">Masters</option>
                        <option value="9">HS-grad</option>
                        <option value="16">Doctorate</option>
                        <option value="10">Some-college</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="marital_status">Marital Status</label>
                    <select id="marital_status" name="marital_status">
                        <option value="4">Never-married</option>
                        <option value="2">Married-civ-spouse</option>
                        <option value="0">Divorced</option>
                        <option value="5">Separated</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="occupation">Occupation</label>
                    <select id="occupation" name="occupation">
                        <option value="3">Exec-managerial</option>
                        <option value="9">Prof-specialty</option>
                        <option value="0">Adm-clerical</option>
                        <option value="11">Sales</option>
                        <option value="12">Tech-support</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="relationship">Relationship</label>
                    <select id="relationship" name="relationship">
                        <option value="1">Not-in-family</option>
                        <option value="0">Husband</option>
                        <option value="5">Wife</option>
                        <option value="3">Own-child</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="race">Race</label>
                    <select id="race" name="race">
                        <option value="4">White</option>
                        <option value="2">Black</option>
                        <option value="1">Asian-Pac-Islander</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="sex">Sex</label>
                    <select id="sex" name="sex">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hours_per_week">Hours Per Week</label>
                    <input type="text" id="hours_per_week" name="hours_per_week" placeholder="e.g. 40">
                </div>

                <div class="form-group">
                    <label for="native_country">Country</label>
                    <select id="native_country" name="native_country">
                        <option value="38">United-States</option>
                        <option value="18">India</option>
                        <option value="1">Canada</option>
                        <option value="10">Germany</option>
                    </select>
                </div>

                <div class="submit-area">
                    <input type="submit" value="Predict Income Range">
                </div>

            </div>
        </form>
    </div>

</body>
</html>
